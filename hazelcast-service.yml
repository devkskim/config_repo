  profiles: dev

server:
  port: 8093

eureka:
  client:
    serviceUrl:
      defaultZone: http://10.250.238.108:8761/eureka/
  instance:
    prefer-ip-address: true

hazelcast:
  cluster-name: hazelcast-dev-cluster
  network:
    port: 5701
    port-auto-increment: true
    join:
      multicast:
        enabled: false
      tcp-ip:
        enabled: true
        members: 10.250.238.101:5701,10.250.238.102:5701
  map:
    default:
