      max-idle-seconds: 60
      eviction-policy: LRU
      max-size: 1000
    session-cache:
      time-to-live-seconds: 1800
      max-idle-seconds: 300
      eviction-policy: LRU
      max-size: 5000

spring:
  cache:
    type: hazelcast
  session:
    store-type: hazelcast
    hazelcast:
      map-name: spring:session:sessions
