#################################
#### hazelcast-service ##########
#################################

info:
  component: Hazelcast Cache Service

---

spring:
  application:
    name: hazelcast-service

---

spring:
  profiles:
    active: local

---

spring:
  profiles: local

server:
  port: 8093

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

hazelcast:
  cluster-name: hazelcast-local-cluster
  network:
    port: 5701
    port-auto-increment: true
    join:
      multicast:
        enabled: true
        multicast-group: 224.2.2.3
        multicast-port: 54327
      tcp-ip:
        enabled: false
  map:
    default:
      time-to-live-seconds: 300
      max-idle-seconds: 60
      eviction-policy: LRU
      max-size: 1000
    session-cache:
      time-to-live-seconds: 1800
      max-idle-seconds: 300
      eviction-policy: LRU
      max-size: 5000

spring:
  cache:
    type: hazelcast
  session:
    store-type: hazelcast
    hazelcast:
      map-name: spring:session:sessions
      flush-mode: on-save

logging:
  level:
    com.hazelcast: INFO
    root: INFO

---

